<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ CodeDuel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #181f27 50%, #212834 100%);
            color: #e4e7eb;
            height: 100vh;
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; }

        /* ТWIТCH САЙДБАР */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f1419 0%, #181f27 100%);
            border-right: 1px solid #2a3441;
            padding: 24px 20px;
            box-shadow: inset -4px 0 12px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, #9146ff, #ff4985, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab-btn {
            padding: 14px 16px;
            background: #212834;
            border: 1px solid #2a3441;
            border-radius: 8px;
            color: #b1b7c1;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tab-btn:hover { background: #2a3441; border-color: #9146ff; }
        .tab-btn.active {
            background: linear-gradient(135deg, #9146ff, #ff4985);
            color: white;
            box-shadow: 0 4px 12px rgba(145, 70, 255, 0.4);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .task-card, .room-card {
            background: #212834;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #2a3441;
            cursor: pointer;
            transition: all 0.2s;
        }
        .task-card:hover, .room-card:hover {
            border-color: #9146ff;
            box-shadow: 0 4px 16px rgba(145, 70, 255, 0.2);
            transform: translateY(-1px);
        }

        .task-title { font-weight: 600; color: #fff; margin-bottom: 6px; font-size: 15px; }
        .task-desc { font-size: 13px; color: #b1b7c1; line-height: 1.4; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9146ff, #ff4985);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(145, 70, 255, 0.4);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            background: #2a3441;
            border: 1px solid #3a4350;
            border-radius: 8px;
            color: #e4e7eb;
            font-size: 14px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .input-field:focus { outline: none; border-color: #9146ff; box-shadow: 0 0 0 3px rgba(145,70,255,0.1); }

        /* АДМИН ПАНЕЛЬ */
        .admin-section {
            background: linear-gradient(135deg, #1a1f28, #212834);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #9146ff;
            margin-top: 16px;
        }
        .admin-title { color: #9146ff; font-weight: 600; margin-bottom: 16px; }

        /* ГЛАВНАЯ */
        .main { flex: 1; display: flex; flex-direction: column; }
        .top-bar {
            background: rgba(15,20,25,0.95);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            border-bottom: 1px solid #2a3441;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-container {
            flex: 1;
            display: flex;
            padding: 24px;
            gap: 20px;
            overflow: hidden;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .editor-header {
            background: #212834;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 13px;
            border-bottom: 1px solid #2a3441;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-online { background: rgba(0,210,255,0.2); color: #00d4ff; }
        .status-waiting { background: rgba(255,193,7,0.2); color: #ffc107; }
        .status-offline { background: rgba(108,117,125,0.2); color: #adb5bd; }

        #battleLog {
            height: 140px;
            background: #181f27;
            border-radius: 10px;
            padding: 16px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            border: 1px solid #2a3441;
            margin: 0 24px 24px;
        }
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #2a344140;
            opacity: 0.9;
        }
        .log-win { color: #00d4ff; }
        .log-loss { color: #ff6b6b; }

        .twitch-btn {
            padding: 10px 20px;
            margin-left: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        /* CodeMirror Twitch стиль */
        .CodeMirror {
            height: 100% !important;
            font-family: 'JetBrains Mono', 'Consolas', monospace !important;
            font-size: 14px !important;
        }
        .CodeMirror-gutters { background: #181f27 !important; border-right: 1px solid #2a3441 !important; }
        .CodeMirror-linenumber { color: #6c757d !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ТWIТCH САЙДБАР -->
        <div class="sidebar">
            <div class="logo">⚔️ CodeDuel</div>

            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('auth')">👤 Профиль</button>
                <button class="tab-btn" onclick="switchTab('tasks')">📝 Задания</button>
                <button class="tab-btn" onclick="switchTab('rooms')">🏠 Дуэли</button>
                <button class="tab-btn" onclick="switchTab('admin')">🔧 Админ</button>
            </div>

            <!-- Аутентификация -->
            <div id="authTab" class="tab-content active">
                <div class="user-card hidden" id="userInfo">
                    <div style="text-align:center; margin-bottom:16px;">
                        <div style="font-size:18px; font-weight:700; color:#fff; margin-bottom:4px;" id="username"></div>
                        <div style="font-size:12px; color:#6c757d;" id="userId"></div>
                    </div>
                </div>
                <input id="usernameInput" class="input-field" placeholder="👤 Имя пользователя">
                <input id="passwordInput" class="input-field" type="password" placeholder="🔒 Пароль">
                <button class="btn-primary" onclick="login()">🚀 Войти</button>
                <button class="btn-primary" onclick="register()" style="background: linear-gradient(135deg, #ff6b6b, #ff8e8e);">➕ Регистрация</button>
            </div>

            <!-- Задания -->
            <div id="tasksTab" class="tab-content">
                <div id="tasksList">Загрузка заданий...</div>
                <button id="createDuelBtn" class="btn-primary" onclick="createDuel()" disabled>⚔️ Создать дуэль</button>
            </div>

            <!-- Комнаты -->
            <div id="roomsTab" class="tab-content">
                <div id="roomsList">Загрузка дуэлей...</div>
            </div>

            <!-- АДМИН ПАНЕЛЬ -->
            <div id="adminTab" class="tab-content">
                <div class="admin-section">
                    <div class="admin-title">➕ Добавить задание</div>
                    <input id="adminTitle" class="input-field" placeholder="Название">
                    <textarea id="adminDesc" class="input-field" rows="2" placeholder="Описание"></textarea>
                    <textarea id="adminTest" class="input-field" rows="3" placeholder="print(solution(3, 5))"></textarea>
                    <input id="adminExpected" class="input-field" placeholder='Ожидаемый вывод: "8"'>
                    <button class="btn-primary" onclick="adminAddTask()">Добавить</button>
                </div>
                <div class="admin-section" style="margin-top:16px;">
                    <div class="admin-title">🗑️ Управление заданиями</div>
                    <div id="adminTasksList"></div>
                </div>
            </div>
        </div>

        <!-- ГЛАВНАЯ ОБЛАСТЬ -->
        <div class="main">
            <div class="top-bar">
                <div style="display:flex; align-items:center; gap:16px;">
                    <div id="currentTask" style="font-weight:600; font-size:16px;"></div>
                    <div id="timer" style="font-family:'JetBrains Mono'; font-weight:500;"></div>
                </div>
                <div style="display:flex; gap:8px;">
                    <span id="rivalStatus" class="status-badge status-offline">Ожидание...</span>
                    <button id="checkBtn" class="twitch-btn" onclick="checkCode()" disabled>✅ Проверить</button>
                </div>
            </div>

            <div class="editor-container">
                <div class="editor-panel">
                    <div class="editor-header">
                        <span>✏️ ТВОЙ КОД</span>
                        <span id="myCodeStatus" style="font-size:12px; color:#6c757d;">Редактируется</span>
                    </div>
                    <textarea id="myCode"># Выбери задание для начала</textarea>
                </div>

                <div class="editor-panel">
                    <div class="editor-header">
                        <span>🔴 СОПЕРНИК</span>
                        <span id="rivalCodeStatus" class="status-badge status-offline">Ожидание...</span>
                    </div>
                    <textarea id="rivalCode"># Код соперника появится здесь</textarea>
                </div>
            </div>

            <div id="battleLog">📜 Лог дуэли: Выбери задание и создай дуэль</div>
        </div>
    </div>

    <script>
        let currentUser = null, currentTask = null, ws = null, battleActive = false;
        let myEditor, rivalEditor, timerInterval;

        // CodeMirror
        myEditor = CodeMirror.fromTextArea(document.getElementById('myCode'), {
            mode: 'python', lineNumbers: true, theme: 'default',
            indentUnit: 4, lineWrapping: true, autofocus: true
        });
        rivalEditor = CodeMirror.fromTextArea(document.getElementById('rivalCode'), {
            mode: 'python', lineNumbers: true, theme: 'default', readOnly: true
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');

            if (tabName === 'tasks') loadTasks();
            if (tabName === 'rooms') loadRooms();
            if (tabName === 'admin') loadAdminTasks();
        }

        async function login() {
            const name = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            if (!name || !pass) return alert('Заполни все поля!');

            const res = await fetch('/users/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, password: pass})
            });
            const data = await res.json();

            if (res.ok) {
                currentUser = data;
                document.getElementById('username').textContent = data.name;
                document.getElementById('userId').textContent = `#${data.user_id}`;
                document.getElementById('userInfo').classList.remove('hidden');
                document.getElementById('usernameInput').value = '';
                document.getElementById('passwordInput').value = '';
                loadTasks();
            } else alert(data.detail);
        }

        async function register() {
            const name = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            const res = await fetch('/users/registration', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, password: pass})
            });
            alert(res.ok ? '✅ Зарегистрирован!' : 'Ошибка регистрации');
        }

        async function loadTasks() {
            const res = await fetch('/tasks');
            const tasks = await res.json();
            document.getElementById('tasksList').innerHTML = tasks.map(t => `
                <div class="task-card" onclick="selectTask(${t.id}, '${t.title.replace(/'/g,"\\'")}', '${t.description.replace(/'/g,"\\'")}')">
                    <div class="task-title">${t.title}</div>
                    <div class="task-desc">${t.description}</div>
                </div>
            `).join('') || '<div style="text-align:center;color:#6c757d;">Нет заданий</div>';
        }

        function selectTask(id, title, desc) {
            currentTask = {id, title, desc};
            document.getElementById('currentTask').textContent = title;
            document.getElementById('createDuelBtn').disabled = false;
            myEditor.setValue(`# ${title}\n# ${desc}\n\ndef solution():\n    pass`);
        }

        async function createDuel() {
            if (!currentTask || !currentUser) return alert('Войди и выбери задание!');
            const res = await fetch('/rooms', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({player1: currentUser.name})
            });
            const data = await res.json();
            connectDuel(data.code);
        }

        function connectDuel(code) {
            ws = new WebSocket(`ws://localhost:8000/ws/${code}`);
            document.getElementById('rivalStatus').textContent = 'Ожидание...';
            document.getElementById('rivalStatus').className = 'status-badge status-waiting';

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'battle_ready') {
                    battleActive = true;
                    document.getElementById('rivalStatus').textContent = 'Онлайн';
                    document.getElementById('rivalStatus').className = 'status-badge status-online';
                    document.getElementById('checkBtn').disabled = false;
                    addLog('⚔️ Дуэль началась!');
                    startTimer();
                }
                if (data.type === 'rival_code') {
                    rivalEditor.setValue(data.code);
                    document.getElementById('rivalCodeStatus').textContent = 'Обновлено';
                }
            };

            setInterval(() => {
                if (ws && battleActive) {
                    ws.send(JSON.stringify({
                        code: myEditor.getValue(),
                        player: currentUser.name
                    }));
                }
            }, 800);
        }

        async function checkCode() {
            const res = await fetch(`/tasks/${currentTask.id}/check`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: myEditor.getValue()})
            });
            const result = await res.json();
            if (result.correct) {
                addLog('🏆 ПОБЕДА! Код верный!', 'log-win');
                alert('✅ Правильно! Ты победил!');
            } else {
                addLog('❌ Код неверный', 'log-loss');
            }
        }

        async function loadRooms() {
            const res = await fetch('/rooms');
            const rooms = await res.json();
            document.getElementById('roomsList').innerHTML = rooms.map(r => `
                <div class="room-card">
                    <div class="task-title">${r.code}</div>
                    <div style="font-size:13px;color:#b1b7c1;">${r.player1}</div>
                    <button class="btn-primary" onclick="connectDuel('${r.code}')" style="margin-top:8px;">Присоединиться</button>
                </div>
            `).join('') || '<div style="text-align:center;color:#6c757d;">Нет дуэлей</div>';
        }

        // АДМИН ПАНЕЛЬ
        async function adminAddTask() {
            const data = {
                title: document.getElementById('adminTitle').value,
                description: document.getElementById('adminDesc').value,
                test_code: document.getElementById('adminTest').value,
                expected_output: document.getElementById('adminExpected').value
            };
            const res = await fetch('/admin/tasks/add', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('✅ Задание добавлено!');
                document.getElementById('adminTitle').value = '';
                loadAdminTasks();
                loadTasks();
            }
        }

        async function loadAdminTasks() {
            const res = await fetch('/tasks');
            const tasks = await res.json();
            document.getElementById('adminTasksList').innerHTML = tasks.map(t => `
                <div style="display:flex; gap:8px; align-items:center; padding:12px; background:#212834; border-radius:8px; margin-bottom:8px;">
                    <span style="flex:1; font-weight:500;">${t.title}</span>
                    <button onclick="deleteTask(${t.id})" style="padding:6px 12px; background:#ff6b6b; border:none; border-radius:4px; color:white; cursor:pointer;">🗑️</button>
                </div>
            `).join('');
        }

        async function deleteTask(id) {
            if (confirm('Удалить задание?')) {
                await fetch(`/admin/tasks/${id}`, {method: 'DELETE'});
                loadAdminTasks();
                loadTasks();
            }
        }

        function addLog(msg, className = '') {
            const log = document.getElementById('battleLog');
            log.innerHTML = `<div class="log-entry ${className}">${new Date().toLocaleTimeString()}: ${msg}</div>` + log.innerHTML.slice(0, 2000);
            log.scrollTop = 0;
        }

        function startTimer() {
            let time = 180;
            document.getElementById('timer').textContent = '⏱️ 3:00';
            timerInterval = setInterval(() => {
                const min = Math.floor(time/60);
                const sec = time%60;
                document.getElementById('timer').textContent = `⏱️ ${min}:${sec.toString().padStart(2,'0')}`;
                time--;
                if (time < 0) {
                    clearInterval(timerInterval);
                    addLog('⏰ Время вышло!');
                }
            }, 1000);
        }

        // Инициализация
        loadTasks();
        document.addEventListener('keypress', e => {
            if (e.key === 'Enter' && document.getElementById('authTab').classList.contains('active')) login();
        });
    </script>
</body>
</html>
